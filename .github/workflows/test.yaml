name: test

on:
  # test in isolation
  push:
  # test as-merged
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/ruff-action@v3  # runs "ruff check" by default

    - run: ruff format --check --diff --exit-non-zero-on-format

  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        activate-environment: true

    - name: Install the project
      run: uv sync --locked --all-groups

    - name: pytest  # also runs mypy
      run: |
        pytest

    - name: build wheel
      run: uv build --wheel

    - name: smoketest built wheel
      run: uv tool run dist/*.whl --help
